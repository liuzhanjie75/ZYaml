name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Windows: MSVC Debug + Release, default test set ─────────────────
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.x
      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
      - name: Test (default suite, no bench/fuzz_diff)
        working-directory: build
        run: ctest -C ${{ matrix.build_type }} --output-on-failure -LE bench

  # ── Windows: Debug + differential fuzzer (libyaml fetch) ────────────
  windows-fuzz-diff:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.x
      - name: Configure with fuzz_diff
        run: cmake -S . -B build_diff -G "Visual Studio 17 2022" -A x64 -DZYAML_BUILD_FUZZ_DIFF=ON
      - name: Build fuzz_diff
        run: cmake --build build_diff --config Debug --target fuzz_diff
      - name: Run differential fuzzer (strict oracle)
        working-directory: build_diff
        run: ctest -C Debug -R fuzz_diff --output-on-failure

  # ── Windows: Release + benchmark gate ────────────────────────────────
  windows-bench:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.x
      - name: Configure with bench
        run: cmake -S . -B build_bench -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DZYAML_BUILD_BENCH=ON
      - name: Build
        run: cmake --build build_bench --config Release
      - name: Run benchmark (Release only)
        working-directory: build_bench
        run: ctest -C Release -L bench --output-on-failure

  # ── Linux: Clang 20 + modules (broader compiler coverage) ───────────
  # Ubuntu's default clang is 16-18; the project requires Clang 20+ for
  # module support. Install from the official LLVM apt repo and pin the
  # compiler + clang-scan-deps explicitly.
  linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake 4.x
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.x
      - name: Install Clang 20 + ninja
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
          sudo apt-get install -y ninja-build
      - name: Configure
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-20 \
            -DCMAKE_CXX_COMPILER_CLANG_SCAN_DEPS=$(which clang-scan-deps-20)
      - name: Build
        run: cmake --build build
      - name: Test (default suite)
        working-directory: build
        run: ctest --output-on-failure -LE bench
